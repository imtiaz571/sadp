<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Aircraft — SkyWay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active">Aircraft</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/routes}">Routes</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/schedules}">Schedules</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1>Aircraft</h1>
                <p class="mb-0">Manage airlines and fleet</p>
            </div>
            <a th:href="@{/admin/buses/add}" class="btn btn-accent">+ Add Aircraft</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Airline Name</th>
                                <th>Flight Number</th>
                                <th>Class</th>
                                <th>Seats</th>
                                <th>Amenities</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bus : ${buses}">
                                <td th:text="${bus.id}"></td>
                                <td class="fw-bold" th:text="${bus.busName}"></td>
                                <td th:text="${bus.busNumber}"></td>
                                <td>
                                    <span class="bus-type-badge"
                                          th:classappend="${bus.busType == 'AC'} ? 'badge-ac' : (${bus.busType == 'LUXURY'} ? 'badge-luxury' : 'badge-regular')"
                                          th:text="${bus.busType == 'AC'} ? 'Business' : (${bus.busType == 'LUXURY'} ? 'First Class' : 'Economy')"></span>
                                </td>
                                <td th:text="${bus.totalSeats}"></td>
                                <td style="font-size:0.82rem; max-width:200px;" th:text="${bus.amenities}"></td>
                                <td>
                                    <a th:href="@{'/admin/buses/edit/' + ${bus.id}}" class="btn btn-sm btn-primary me-1">Edit</a>
                                    <a th:href="@{'/admin/buses/delete/' + ${bus.id}}" class="btn btn-sm btn-outline-secondary"
                                       onclick="return confirm('Delete this aircraft?')">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 SkyWay Admin</p></div>
    </footer>

</body>
</html>
