<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${bus != null} ? 'Edit Aircraft — SkyWay Admin' : 'Add Aircraft — SkyWay Admin'">Aircraft Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/buses}">Aircraft</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1 th:text="${bus != null} ? 'Edit Aircraft' : 'Add Aircraft'">Aircraft Form</h1>
            <p class="mb-0">Manage airline fleet details</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header gradient-header">Aircraft Details</div>
                    <div class="card-body p-4">
                        <form th:action="${bus != null} ? @{'/admin/buses/edit/' + ${bus.id}} : @{/admin/buses/add}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Airline Name</label>
                                <input type="text" class="form-control" name="busName" th:value="${bus?.busName}" placeholder="e.g., Emirates" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Flight Number</label>
                                <input type="text" class="form-control" name="busNumber" th:value="${bus?.busNumber}" placeholder="e.g., EK-501" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Flight Class</label>
                                <select class="form-select" name="busType" required>
                                    <option value="REGULAR" th:selected="${bus?.busType == 'REGULAR'}">Economy</option>
                                    <option value="AC" th:selected="${bus?.busType == 'AC'}">Business</option>
                                    <option value="LUXURY" th:selected="${bus?.busType == 'LUXURY'}">First Class</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Total Seats</label>
                                <input type="number" class="form-control" name="totalSeats" th:value="${bus?.totalSeats}" placeholder="e.g., 180" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Amenities</label>
                                <input type="text" class="form-control" name="amenities" th:value="${bus?.amenities}" placeholder="e.g., WiFi, Meals, Entertainment">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-accent flex-fill" th:text="${bus != null} ? 'Update' : 'Add Aircraft'">Save</button>
                                <a th:href="@{/admin/buses}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 SkyWay Admin</p></div>
    </footer>

</body>
</html>
