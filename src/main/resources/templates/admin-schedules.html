<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Schedules — SkyWay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/buses}">Aircraft</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/routes}">Routes</a></li>
                    <li class="nav-item"><a class="nav-link active">Schedules</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1>Schedules</h1>
                <p class="mb-0">Manage flight schedules</p>
            </div>
            <a th:href="@{/admin/schedules/add}" class="btn btn-accent">+ Add Schedule</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Airline</th>
                                <th>Route</th>
                                <th>Departure</th>
                                <th>Arrival</th>
                                <th>Seats</th>
                                <th>Fare</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="schedule : ${schedules}">
                                <td th:text="${schedule.id}"></td>
                                <td>
                                    <strong th:text="${schedule.bus.busName}"></strong><br>
                                    <small class="text-muted" th:text="${schedule.bus.busNumber}"></small>
                                </td>
                                <td th:text="${schedule.route.origin + ' → ' + schedule.route.destination}"></td>
                                <td th:text="${#temporals.format(schedule.departureTime, 'dd MMM, HH:mm')}"></td>
                                <td th:text="${#temporals.format(schedule.arrivalTime, 'dd MMM, HH:mm')}"></td>
                                <td th:text="${schedule.availableSeats}"></td>
                                <td th:text="'৳' + ${schedule.fare}"></td>
                                <td>
                                    <span class="badge" th:classappend="${schedule.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${schedule.status}"></span>
                                </td>
                                <td>
                                    <a th:href="@{'/admin/schedules/edit/' + ${schedule.id}}" class="btn btn-sm btn-primary me-1">Edit</a>
                                    <a th:href="@{'/admin/schedules/revert/' + ${schedule.id}}" class="btn btn-sm btn-outline-secondary me-1"
                                       onclick="return confirm('Revert to previous state?')" title="Memento: Revert">↩</a>
                                    <a th:href="@{'/admin/schedules/delete/' + ${schedule.id}}" class="btn btn-sm btn-outline-secondary"
                                       onclick="return confirm('Delete this schedule?')">Del</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 SkyWay Admin</p></div>
    </footer>

</body>
</html>
