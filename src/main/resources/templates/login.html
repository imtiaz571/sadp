<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SkyWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div style="width:48px;height:48px;background:#111;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;color:#c8ff00;font-size:1.2rem;margin-bottom:1rem;">✈</div>
                <h2>Welcome back</h2>
                <p class="subtitle">Login to your SkyWay account.</p>
            </div>

            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    Login
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted-custom">No account? <a th:href="@{/register}" style="color: var(--primary); font-weight: 600;">Register</a></p>
            </div>
        </div>
    </div>

</body>
</html>
