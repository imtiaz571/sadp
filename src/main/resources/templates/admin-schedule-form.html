<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${schedule != null} ? 'Edit Schedule — SkyWay Admin' : 'Add Schedule — SkyWay Admin'">Schedule Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/schedules}">Schedules</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1 th:text="${schedule != null} ? 'Edit Schedule' : 'Add Schedule'">Schedule Form</h1>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header gradient-header">Schedule Details</div>
                    <div class="card-body p-4">
                        <form th:action="${schedule != null} ? @{'/admin/schedules/edit/' + ${schedule.id}} : @{/admin/schedules/add}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Aircraft</label>
                                <select class="form-select" name="busId" required>
                                    <option value="">— Select aircraft —</option>
                                    <option th:each="bus : ${buses}" th:value="${bus.id}"
                                            th:selected="${schedule != null && schedule.bus.id == bus.id}"
                                            th:text="${bus.busName + ' (' + bus.busNumber + ')'}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Route</label>
                                <select class="form-select" name="routeId" required>
                                    <option value="">— Select route —</option>
                                    <option th:each="route : ${routes}" th:value="${route.id}"
                                            th:selected="${schedule != null && schedule.route.id == route.id}"
                                            th:text="${route.origin + ' → ' + route.destination}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Departure Time</label>
                                <input type="datetime-local" class="form-control" name="departureTime"
                                       th:value="${schedule != null} ? ${#temporals.format(schedule.departureTime, 'yyyy-MM-dd''T''HH:mm')}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Arrival Time</label>
                                <input type="datetime-local" class="form-control" name="arrivalTime"
                                       th:value="${schedule != null} ? ${#temporals.format(schedule.arrivalTime, 'yyyy-MM-dd''T''HH:mm')}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Base Fare (৳)</label>
                                <input type="number" step="0.01" class="form-control" name="fare"
                                       th:value="${schedule?.fare}" placeholder="e.g., 5000" required>
                            </div>
                            <div th:if="${schedule != null}" class="mb-3">
                                <label class="form-label">Available Seats</label>
                                <input type="number" class="form-control" name="availableSeats" th:value="${schedule?.availableSeats}">
                            </div>
                            <div th:if="${schedule != null}" class="mb-4">
                                <label class="form-label">Status</label>
                                <select class="form-select" name="status">
                                    <option value="ACTIVE" th:selected="${schedule?.status == 'ACTIVE'}">Active</option>
                                    <option value="INACTIVE" th:selected="${schedule?.status == 'INACTIVE'}">Inactive</option>
                                    <option value="CANCELLED" th:selected="${schedule?.status == 'CANCELLED'}">Cancelled</option>
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-accent flex-fill" th:text="${schedule != null} ? 'Update' : 'Add Schedule'">Save</button>
                                <a th:href="@{/admin/schedules}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Memento History (edit mode) -->
                <div class="card mt-4" th:if="${schedule != null && mementos != null && !#lists.isEmpty(mementos)}">
                    <div class="card-header gradient-header">Previous States (Memento)</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>Saved At</th>
                                        <th>Fare</th>
                                        <th>Seats</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="memento : ${mementos}">
                                        <td th:text="${#temporals.format(memento.savedAt, 'dd MMM, HH:mm')}"></td>
                                        <td th:text="'৳' + ${memento.fare}"></td>
                                        <td th:text="${memento.availableSeats}"></td>
                                        <td th:text="${memento.status}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 SkyWay Admin</p></div>
    </footer>

</body>
</html>
