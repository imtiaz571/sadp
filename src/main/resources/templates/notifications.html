<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — SkyWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/my-bookings}">My Bookings</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Notifications</h1>
            <p class="mb-0">Your booking alerts and updates</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="text-center py-5" th:if="${#lists.isEmpty(notifications)}">
                    <h3 style="color: var(--text-secondary); font-weight: 600;">No notifications</h3>
                    <p class="text-muted-custom">Book a flight to receive notifications!</p>
                </div>

                <div th:each="notification : ${notifications}" class="notification-item">
                    <p class="mb-1" style="font-size:0.9rem;" th:text="${notification.message}"></p>
                    <small style="color: var(--text-muted);" th:text="${#temporals.format(notification.createdAt, 'dd MMM yyyy, hh:mm a')}"></small>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SkyWay — Airline Ticket Management System</p>
        </div>
    </footer>

</body>
</html>
