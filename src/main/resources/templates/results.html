<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Results — SkyWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/search}">Search</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser == null}"><a class="nav-link btn" th:href="@{/login}">Login</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser != null}"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Available Flights</h1>
            <p class="mb-0">
                <span th:text="${origin}"></span> → <span th:text="${destination}"></span>
                &nbsp;·&nbsp; <span th:text="${travelDate}"></span>
            </p>
        </div>
    </div>

    <div class="container mb-5">

        <div class="text-center py-5" th:if="${#lists.isEmpty(schedules)}">
            <h3 style="color: var(--text-secondary); font-weight: 600;">No flights found</h3>
            <p class="text-muted-custom">Try a different date or route.</p>
            <a th:href="@{/search}" class="btn btn-primary mt-2">Search Again</a>
        </div>

        <div th:if="${!#lists.isEmpty(schedules)}">
            <p class="text-muted-custom mb-3">
                <strong th:text="${#lists.size(schedules)}"></strong> flight(s) found
            </p>

            <div th:each="schedule : ${schedules}" class="schedule-card">
                <div class="row align-items-center">
                    <div class="col-md-3">
                        <h6 class="mb-1 fw-bold" th:text="${schedule.bus.busName}">Airline</h6>
                        <span class="bus-type-badge"
                              th:classappend="${schedule.bus.busType == 'AC'} ? 'badge-ac' : (${schedule.bus.busType == 'LUXURY'} ? 'badge-luxury' : 'badge-regular')"
                              th:text="${schedule.bus.busType == 'AC'} ? 'Business' : (${schedule.bus.busType == 'LUXURY'} ? 'First Class' : 'Economy')">Class</span>
                        <p class="text-muted-custom mt-1 mb-0" style="font-size:0.78rem;" th:text="'Flight ' + ${schedule.bus.busNumber}"></p>
                    </div>
                    <div class="col-md-3">
                        <p class="mb-0" style="font-size:0.9rem;">
                            <strong th:text="${#temporals.format(schedule.departureTime, 'hh:mm a')}"></strong>
                            <span style="color:var(--text-muted);"> → </span>
                            <strong th:text="${#temporals.format(schedule.arrivalTime, 'hh:mm a')}"></strong>
                        </p>
                        <p class="mb-0 text-muted-custom" style="font-size:0.78rem;" th:text="${#temporals.format(schedule.departureTime, 'dd MMM yyyy')}"></p>
                    </div>
                    <div class="col-md-2 text-center">
                        <strong th:text="${schedule.availableSeats}">0</strong>
                        <span class="text-muted-custom" style="font-size:0.8rem;"> seats</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <div class="fare-display">
                            ৳<span th:text="${dynamicFares[schedule.id]}">0</span>
                        </div>
                        <span class="pricing-badge" th:text="${pricingNames[schedule.id]}">Regular</span>
                    </div>
                    <div class="col-md-2 text-end">
                        <a th:href="@{'/book/' + ${schedule.id}}" class="btn btn-accent">
                            Book
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SkyWay — Airline Ticket Management System</p>
        </div>
    </footer>

</body>
</html>
