<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings — SkyWay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/buses}">Aircraft</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/routes}">Routes</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/schedules}">Schedules</a></li>
                    <li class="nav-item"><a class="nav-link active">Bookings</a></li>
                    <li class="nav-item ms-1"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>All Bookings</h1>
            <p class="mb-0">View all passenger bookings</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Passenger</th>
                                <th>Airline</th>
                                <th>Route</th>
                                <th>Departure</th>
                                <th>Seat</th>
                                <th>Fare</th>
                                <th>Status</th>
                                <th>Booked</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td th:text="${booking.id}"></td>
                                <td class="fw-bold" th:text="${booking.passengerName}"></td>
                                <td th:text="${booking.schedule.bus.busName}"></td>
                                <td th:text="${booking.schedule.route.origin + ' → ' + booking.schedule.route.destination}"></td>
                                <td th:text="${#temporals.format(booking.schedule.departureTime, 'dd MMM, HH:mm')}"></td>
                                <td><strong th:text="${booking.seatNumber}"></strong></td>
                                <td th:text="'৳' + ${booking.totalFare}"></td>
                                <td><span class="badge bg-success" th:text="${booking.bookingStatus}"></span></td>
                                <td style="font-size:0.8rem;" th:text="${#temporals.format(booking.bookingDate, 'dd MMM, hh:mm a')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 SkyWay Admin</p></div>
    </footer>

</body>
</html>
