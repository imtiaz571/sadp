<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights — SkyWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/search}">Search</a></li>
                    <li class="nav-item" th:if="${session.loggedInUser != null}"><a class="nav-link" th:href="@{/my-bookings}">My Bookings</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser == null}"><a class="nav-link btn" th:href="@{/login}">Login</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser != null}"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Search Flights</h1>
            <p class="mb-0">Find the perfect flight for your journey</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header gradient-header">
                        Enter Flight Details
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/results}" method="get">
                            <div class="mb-3">
                                <label class="form-label" for="origin">From</label>
                                <input type="text" class="form-control" id="origin" name="origin" placeholder="e.g., Dhaka" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="destination">To</label>
                                <input type="text" class="form-control" id="destination" name="destination" placeholder="e.g., Dubai" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="travelDate">Travel Date</label>
                                <input type="date" class="form-control" id="travelDate" name="travelDate" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                Search Available Flights
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SkyWay — Airline Ticket Management System</p>
        </div>
    </footer>

</body>
</html>
