<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding Pass — SkyWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg no-print">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">✈</span> SkyWay</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/search}">Search</a></li>
                    <li class="nav-item" th:if="${session.loggedInUser != null}"><a class="nav-link" th:href="@{/my-bookings}">My Bookings</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser != null}"><a class="nav-link btn" th:href="@{/logout}">Logout</a></li>
                    <li class="nav-item ms-1" th:if="${session.loggedInUser == null}"><a class="nav-link btn" th:href="@{/login}">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="ticket-container boarding-pass">
            <div class="ticket-card">
                <div class="ticket-header">
                    <p style="opacity:0.5; font-size:0.8rem; margin-bottom:0.3rem;">SKYWAY E-TICKET</p>
                    <h2>Booking Confirmed</h2>
                    <p class="mb-0" style="opacity:0.7;">#<span th:text="${booking.id}"></span></p>
                </div>

                <div class="ticket-body">
                    <div class="flight-route mb-3">
                        <span class="city-code" th:text="${booking.schedule.route.origin}">DAC</span>
                        <span class="flight-line"></span>
                        <span class="city-code" th:text="${booking.schedule.route.destination}">DXB</span>
                    </div>

                    <div class="ticket-info-row">
                        <span class="ticket-label">Passenger</span>
                        <span class="ticket-value" th:text="${booking.passengerName}"></span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-label">Airline</span>
                        <span class="ticket-value" th:text="${booking.schedule.bus.busName}"></span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-label">Class</span>
                        <span class="ticket-value"
                              th:text="${booking.schedule.bus.busType == 'AC'} ? 'Business' : (${booking.schedule.bus.busType == 'LUXURY'} ? 'First Class' : 'Economy')"></span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-label">Flight</span>
                        <span class="ticket-value" th:text="${booking.schedule.bus.busNumber}"></span>
                    </div>

                    <div class="ticket-divider"></div>

                    <div class="ticket-info-row">
                        <span class="ticket-label">Departure</span>
                        <span class="ticket-value" th:text="${#temporals.format(booking.schedule.departureTime, 'dd MMM yyyy, hh:mm a')}"></span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-label">Arrival</span>
                        <span class="ticket-value" th:text="${#temporals.format(booking.schedule.arrivalTime, 'dd MMM yyyy, hh:mm a')}"></span>
                    </div>

                    <div class="ticket-divider"></div>

                    <div class="ticket-info-row">
                        <span class="ticket-label">Seat</span>
                        <span class="ticket-value" style="font-size:1.3rem; color: var(--primary);" th:text="${booking.seatNumber}"></span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-label">Status</span>
                        <span class="ticket-value" style="color: var(--success);" th:text="${booking.bookingStatus}"></span>
                    </div>

                    <div class="ticket-divider"></div>

                    <div class="text-center">
                        <p class="ticket-label mb-1">Total Fare</p>
                        <p class="fare-display" style="font-size:1.8rem;">৳<span th:text="${booking.totalFare}"></span></p>
                    </div>

                    <div class="text-center mt-2" style="font-size:0.72rem; color: var(--text-muted);">
                        Booked <span th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy, hh:mm a')}"></span>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4 no-print">
                <button class="btn btn-primary btn-lg" onclick="window.print()">
                    <i class="bi bi-printer me-1"></i> Print
                </button>
                <a th:if="${session.loggedInUser != null}" th:href="@{/my-bookings}" class="btn btn-outline-secondary btn-lg ms-2">
                    My Bookings
                </a>
                <a th:href="@{/search}" class="btn btn-outline-secondary btn-lg ms-2">
                    Book Another
                </a>
            </div>
        </div>
    </div>

    <footer class="footer no-print">
        <div class="container">
            <p>&copy; 2026 SkyWay — Airline Ticket Management System</p>
        </div>
    </footer>

</body>
</html>
